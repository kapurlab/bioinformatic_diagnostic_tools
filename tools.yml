  - name: ncbi_submit_gui
    repo: https://github.com/kapurlab/ncbi_submit_gui.git
    version: v0.1.1
    ood_apps: [ncbi_submit_gui]
    dev_apps: [ncbi_submit_gui_dev]
    env: ncbi_submit
