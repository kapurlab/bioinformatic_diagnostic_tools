# kraken_id_parse_gui validation spec — see tests/README.md
# Sample: SRR28623786 — Mycobacterium tuberculosis Illumina reads (the tool's own
# documented example). We run --kraken-only (Kraken2 + Krona; skip assembly/BLAST)
# to validate the core taxonomic-identification call without needing the large
# BLAST DB. The tool writes to its CWD, so we run inside {out}; an adapter
# (tests/lib/kraken_top.py) reduces the Kraken2 report to a JSON headline.
# Tier 2: needs an external Kraken2 DB -> SKIPs cleanly when absent.
tier: 2
summary: M. tuberculosis reads -> Kraken2 top-species identification
fetch: sra
accession: SRR28623786
db_check: /srv/kapurlab/databases/kraken2/k2_standard_08gb/opts.k2d
db_hint: Stage a Kraken2 standard DB (e.g. k2_standard_08gb) and update the path in this spec / the tool config.
run_cmd: cd {out} && {python} {tooldir}/bin/kraken_id_parse.py -r1 {r1} -r2 {r2} --kraken-only -k /srv/kapurlab/databases/kraken2/k2_standard_08gb && python3 {testsdir}/lib/kraken_top.py {out}
result_file: kraken_top.json
