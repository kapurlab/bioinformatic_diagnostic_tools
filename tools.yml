# tools.yml — the Kapur Lab tool suite manifest (single source of truth).
#
# Each entry pins one tool repo to a version (a git tag). The umbrella CLI
# (`bdtools`) reads this file to install, update, and report on the suite.
# Tagging THIS repo (e.g. `suite-2026.06`) pins the entire set for a fully
# reproducible deployment.
#
# Fields per tool:
#   name      tool id and default checkout dir name
#   repo      git clone URL (https for public, unauthenticated installs)
#   version   git ref to deploy — a tag (preferred) or a branch
#   ood_apps  the PRODUCTION batch_connect app dir name(s) under <tool>/ood/apps/
#             — these are what every user sees in the dashboard (the only cards
#             a normal `install --server` renders).
#   dev_apps  the DEVELOPER-only card(s) (the git branch-picker `<tool>_dev`).
#             Never installed by default; only with `install --server --with-dev`.
#             Optional — omit for tools that ship no dev card.
#   env       the conda env name the tool builds (informational)
#   databases named reference-DB requirements the installer stages (optional)
#
# All tools carry a baseline tag (vsnp_gui v0.2.0; the rest v0.1.0, cut
# 2026-06-16). Bump a pin with `bdtools update <tool>` once newer tags exist.

suite_version: "2026.06-dev"

tools:
  - name: vsnp_gui
    repo: https://github.com/kapurlab/vsnp_gui.git
    version: v0.2.0
    ood_apps: [vsnp_gui]
    dev_apps: [vsnp_gui_dev]
    env: vsnp3
    databases: [vsnp3_refs]

  - name: amr_plus_gui
    repo: https://github.com/kapurlab/amr_plus_gui.git
    version: v0.1.1
    ood_apps: [amr_plus_gui]
    dev_apps: [amr_plus_gui_dev]
    env: amr_plus
    databases: [amrfinder_db]

  - name: irma_gui
    repo: https://github.com/kapurlab/irma_gui.git
    version: v0.1.1
    ood_apps: [irma_gui]
    dev_apps: [irma_gui_dev]
    env: irma_gui

  - name: genoflu_gui
    repo: https://github.com/kapurlab/genoflu_gui.git
    version: v0.1.1
    ood_apps: [genoflu_gui]
    dev_apps: [genoflu_gui_dev]
    env: genoflu_gui

  - name: mlst_gui
    repo: https://github.com/kapurlab/mlst_gui.git
    version: v0.1.1
    ood_apps: [mlst_gui]
    dev_apps: [mlst_gui_dev]
    env: mlst

  - name: kraken_id_parse_gui
    repo: https://github.com/kapurlab/kraken_id_parse_gui.git
    version: v0.1.1
    ood_apps: [kraken_id_parse_gui]
    dev_apps: [kraken_id_parse_gui_dev]
    env: kraken_id_parse
    databases: [kraken2_db]

  - name: ksnp_gui
    repo: https://github.com/kapurlab/ksnp_gui.git
    version: v0.1.1
    ood_apps: [ksnp_gui]
    dev_apps: [ksnp_gui_dev]
