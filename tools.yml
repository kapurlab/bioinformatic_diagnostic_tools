# tools.yml — the Kapur Lab tool suite manifest (single source of truth).
#
# Each entry pins one tool repo to a version (a git tag, or a branch until a
# baseline tag is cut). The umbrella CLI (`kapurtools`) reads this file to
# install, update, and report on the suite. Tagging THIS repo (e.g.
# `suite-2026.06`) pins the entire set for a fully reproducible deployment.
#
# Fields per tool:
#   name      tool id and default checkout dir name
#   repo      git clone URL (https for public, unauthenticated installs)
#   version   git ref to deploy — a tag (preferred) or a branch
#   ood_apps  the batch_connect app dir name(s) under <tool>/ood/apps/
#   env       the conda env name the tool builds (informational)
#   databases named reference-DB requirements the installer stages (optional)
#
# NOTE: only vsnp_gui has release tags today. The others pin to a branch until
# plan step 2 (cut a baseline semver tag + GitHub Release per tool) is done.

suite_version: "2026.06-dev"

tools:
  - name: vsnp_gui
    repo: https://github.com/kapurlab/vsnp_gui.git
    version: v0.2.0
    ood_apps: [vsnp_gui]
    env: vsnp3
    databases: [vsnp3_refs]

  - name: amr_plus_gui
    repo: https://github.com/kapurlab/amr_plus_gui.git
    version: main
    ood_apps: [amr_plus_gui]
    env: amr_plus
    databases: [amrfinder_db]

  - name: irma_gui
    repo: https://github.com/kapurlab/irma_gui.git
    version: main
    ood_apps: [irma_gui]
    env: irma_gui

  - name: genoflu_gui
    repo: https://github.com/kapurlab/genoflu_gui.git
    version: main
    ood_apps: [genoflu_gui]
    env: genoflu_gui

  - name: mlst_gui
    repo: https://github.com/kapurlab/mlst_gui.git
    version: main
    ood_apps: [mlst_gui]
    env: mlst

  - name: kraken_id_parse_gui
    repo: https://github.com/kapurlab/kraken_id_parse_gui.git
    version: main
    ood_apps: [kraken_id_parse_gui]
    env: kraken_id_parse
    databases: [kraken2_db]

  - name: ksnp_gui
    repo: https://github.com/kapurlab/ksnp_gui.git
    version: feature/initial-build
    ood_apps: [ksnp_gui]
    env: ksnp

  - name: ncbi_submit_gui
    repo: https://github.com/kapurlab/ncbi_submit_gui.git
    version: feature/initial-build
    ood_apps: [ncbi_submit_gui]
    env: ncbi_submit
